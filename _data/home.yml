profile:
  section_title: Biography
  image: figs/profile.jpg
  image_alt: Profile image
  name: 中本優衣 Yui Nakamoto
  paragraphs:
    - |
      　4才よりピアノを始める。桐朋女子高等学校音楽科、桐朋学園大学、同大学大学院修士課程を修了。ミュンスター音楽大学、ケルン音楽舞踊大学ピアノ科修士課程および歌曲伴奏科修士課程を修了。
      　2018、19年度福島育英会奨学生。Hartmut und Lore Schuler-Stiftung 奨学生。
      　これまでにピアノを玉置善己、練木繁夫、野島稔、Arnulf von Arnim、Florence Milletの各氏に師事。室内楽を練木繁夫、Anthony Spiriの各氏に、歌曲伴奏をUlrich Eisenlohr氏に師事。洗足学園音楽大学演奏補助要員。
    - |
      　第39回全国町田ピアノコンクール第1位および町田市長賞(グランプリ）、審査員特別賞。第13回ルーマニア国際音楽コンクール第3位。第5回緑区新人演奏会オーディション最優秀賞。第9回 桐朋ピアノコンペティションファイナリスト。 多摩フレッシュ音楽コンサート2019にて優秀賞（第2位)。2019年度IMA奨励賞受賞。第15回アルベルト・ルーセルコンクール(フランス）第2位。2023年ブラームス国際コンクールセミファイナリスト。ケルン音楽舞踊大学の歌曲コンクール部門第2位、室内楽部門3位。
      　岡山にて、チェリスト岩崎氏と伴奏者として共演。梅津時比古学長推薦によるベーゼンドルファーランチタイムコンサート等に出演する。デュッセルドルフ日本国総領事公邸にて式典演奏をする他、Ruhr音楽祭のピアノマラソンコンサートに出演。
      　Schleswig-Holstein音楽祭にてElisabeth Leonskajaのマスタークラスを受講。霧島国際音楽祭にてEliso Virsaladzeのマスタークラスを受講。

