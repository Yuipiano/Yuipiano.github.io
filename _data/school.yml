# 中本ピアノ教室の編集用データ
#
# 奥様が主に編集するファイルです。
# 注意:
# - 行頭の空白（インデント）は崩さないでください。
# - 「- 」で始まる行はリスト項目です。
# - 長い文章は | の下に、インデントをそろえて書いてください。
# - 画像を差し替えるときは figs/ 以下の画像ファイル名も合わせて変更してください。

site:
  title: 中本ピアノ教室
  logo: 中本ピアノ教室
  top_note: 中野・沼袋のピアノ教室 / 子どもから大人まで / ピアノ・ソルフェージュ・音大受験対応
  footer: © 2026 中本ピアノ教室 All Rights Reserved.

hero:
  photo: figs/header.jpg
  photo_alt: ピアノの写真
  meta:
    - label: アクセス
      text: |-
        ・西武新宿線沼袋駅より徒歩6分
        ・中野駅からバスと徒歩で10分
    - label: 時間
      text: |-
        平日・休日ともに 9:00〜18:00
        （この時間外でも相談可能です）
    - label: 対象
      text: 子どもから大人まで
    - label: 使用楽器
      text: ヤマハのグランドピアノ
  heading: 2026年4月に開講する小さなピアノ教室です
  lead: |-
    はじめてピアノに触れるお子さまから、趣味として楽しみたい大人の方、音大受験を目指す方まで。それぞれのご希望やペースに合わせて丁寧にレッスンできる教室を目指し、現在開講の準備を進めています。ソルフェージュにも対応予定です。
  simple_info: ヤマハのグランドピアノで、ピアノ・ソルフェージュ・音大受験に対応予定です

teacher:
  section_title: 講師紹介
  photo: figs/teacher.jpg
  photo_alt: 講師写真
  name: 中本 優衣
  paragraphs:
    - ドイツで音楽を学んだ経験も生かしながら、基礎を大切にした、ていねいで分かりやすいレッスンを心がけています。
    - また、楽譜を読む力を育てることや、楽譜から音楽をイメージして想像力をふくらませることも大切にしています。
  profile:
    title: プロフィール
    items:
      - 桐朋女子高等学校音楽科、桐朋学園大学、同大学大学院修士課程を修了
      - ケルン音楽舞踊大学にて学ぶ
      - ドイツではピアノ科修士課程および歌曲伴奏科修士課程を修了
      - 国内外のコンクールで入賞
    link_text_before: ピアニストとしての詳しいプロフィールは
    link_label: こちら
    link_url: https://yuipiano.github.io

lessons:
  section_title: レッスン内容
  items:
    - title: 子どものレッスン
      points:
        - はじめてのピアノ
        - 音符やリズムの基礎
        - 楽しく続けるためのステップアップ
        - 学校伴奏や発表会に向けた練習
    - title: 大人のレッスン
      points:
        - 初心者の方にもやさしく対応
        - 憧れの曲に挑戦したい方
        - ブランクのある方や基礎から学び直したい方
        - 弾き方やテクニックのお悩みにも対応
    - title: 音大受験対策
      points:
        - 実技試験に向けた個別指導
        - 志望校や受験内容に合わせたレッスン
        - 表現力・基礎力の両面を意識した対策
    - title: ソルフェージュレッスン
      points:
        - 聴音
        - 視唱
        - 楽典

pricing:
  section_title: 料金
  cards:
    - title_lines:
        - 子ども
      time: 30分 / 月謝制
      prices:
        - text: 月2回　6,000円
        - text: 月3回　9,000円
        - text: 月4回　12,000円
        - text: 単発　3,500円
          note: 学校伴奏や追加レッスンにも対応します
    - title_lines:
        - 大人
      time: 45分 / 月謝制
      prices:
        - text: 月2回　8,000円
        - text: 月3回　11,500円
        - text: 月4回　15,000円
        - text: 単発　4,500円
          note: ご都合に合わせて単発でも通っていただけます
    - title_lines:
        - 音大受験
        - ソルフェージュ
      time: 60分 / 1回
      prices:
        - text: 1回　5,000円
          note: 内容や回数はご相談のうえ決定いたします
  note: ※上記は目安です。実際のレッスン内容や回数については、ご希望に応じてご相談のうえ対応いたします。

trial:
  section_title: 体験レッスン
  paragraphs:
    - はじめての方にも安心してお越しいただけるよう、体験レッスンをご用意しています。教室の雰囲気やレッスンの進め方、ご希望に合うかどうかを実際にご確認いただけます。
  price: 30分　1,000円
  note: |-
    ご入会いただいた場合は、初回レッスン料から体験レッスン料を差し引きます。
    教室の詳しい場所は、体験レッスンの日程が決まりましたらご案内いたします。

contact:
  section_title: お問い合わせ
  intro: |-
    開講時期や体験レッスンについては、どうぞお気軽にお問い合わせください。
    お子さまも大人の方も歓迎しております。
  email:
    title: メールでのお問い合わせ
    address: nakamotopianoschool@gmail.com
    link_label: メールで問い合わせる
    fallback_before: （メールが送れない場合は
    fallback_link_label: こちら
    fallback_link_url: lesson.html
    fallback_after: のフォームをご利用ください）
  line:
